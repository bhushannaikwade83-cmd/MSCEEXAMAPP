name: msce_exam_app
description: MSCE Exam Center — batches, visual present check, GPS 15m lock
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^8.0.2
  flutter_screenutil: ^5.9.0
  crypto: ^3.0.5
  google_mlkit_face_detection: ^0.13.2
  tflite_flutter: ^0.12.1
  image: ^4.8.0
  http: ^1.2.2
  flutter_cache_manager: ^3.4.1
  shimmer: ^3.0.0
  cupertino_icons: ^1.0.8
  geolocator: ^14.0.2
  camera: ^0.12.0+1
  supabase_flutter: ^2.12.0
  shared_preferences: ^2.3.3
  flutter_dotenv: ^6.0.0
  intl: ^0.20.2
  path_provider: ^2.1.2
  cached_network_image: ^3.3.1
  permission_handler: ^12.0.3
  mobile_scanner: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - app_config.env
    - assets/msce_attendance_app_logo.png
    - assets/models/mobilefacenet.tflite
    - assets/models/anti_spoof_print_replay.tflite
    - assets/models/face_anti_spoofing.tflite
